<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Arcryx X Pegalabyte</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;

    background:linear-gradient(
        -45deg,
        #00140f,
        #001f30,
        #003d2f,
        #00284a
    );

    background-size:400% 400%;
    animation:fundoAnimado 10s ease infinite;
}

body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    radial-gradient(
        ellipse at center,
        rgba(0,0,0,0) 15%,
        rgba(0,0,0,0.35) 55%,
        rgba(0,0,0,0.75) 80%,
        rgba(0,0,0,0.95) 100%
    );

    pointer-events:none;
    z-index:0;
}

@keyframes fundoAnimado{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.signup-box{
    position:relative;
    z-index:1;

    width:500px;
    padding:40px;

    background:rgba(0,0,0,0.80);

    border:3px solid #7e6c09;
    border-radius:20px;

    backdrop-filter:blur(15px);

    box-shadow:
        0 0 20px rgba(0,0,0,0.9),
        0 0 40px rgba(0,0,0,0.8),
        0 0 10px #7e6c09,
        0 0 25px #7e6c09,
        0 0 40px rgba(126,108,9,0.5);

    text-align:center;
}

.logo{
    width:140px;
    margin-bottom:15px;

    filter:
        drop-shadow(0 0 10px #7e6c09)
        drop-shadow(0 0 25px #7e6c09);
}

h1{
    color:#f9fd00;
    margin-bottom:10px;
    font-size:22px;
    font-family:'Press Start 2P', cursive;
}

h2{
    color:white;
    margin-bottom:25px;
    font-size:14px;
}

.input-group{
    position:relative;
    margin-bottom:15px;
}

.input-group input{
    width:100%;
    padding:14px;

    border:none;
    outline:none;
    border-radius:10px;

    background:#101010;
    color:white;

    border:1px solid #333;
}

.input-group input:focus{
    border-color:#00ff99;
    box-shadow:0 0 15px #00ff99;
}

.btn{
    width:100%;
    padding:14px;

    border:none;
    border-radius:10px;

    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.signup-btn{
    background:#00ff99;
    color:black;
}

.signup-btn:hover{
    box-shadow:
        0 0 15px #00ff99,
        0 0 30px #00ff99;
}

.google-btn{
    margin-top:12px;

    background:white;
    color:black;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

.google-btn:hover{
    transform:translateY(-2px);
}

.login-link{
    display:block;

    margin-top:15px;

    color:#FFD700;
    text-decoration:none;
}

.login-link:hover{
    text-shadow:0 0 10px #FFD700;
}

.footer{
    margin-top:20px;
    color:#666;
    font-size:12px;
}

hr{
    margin:20px 0;
    border:1px solid #222;
}
.input-group{
    position:relative;
    margin-bottom:15px;
}

.input-group input{
    width:100%;
    padding:14px 50px 14px 14px;
}

.toggle-password{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);

    color:#aaa;
    cursor:pointer;

    transition:0.3s;
}

.toggle-password:hover{
    color:#00ff99;
}
</style>
</head>

<body>

<div class="signup-box">

    <img src="logo.png" class="logo" alt="Logo">

    <h1>CRIAR CONTA</h1>
    <h2>Arcryx X Pegalabyte</h2>

  <div class="input-group">
    <input id="username" type="text" placeholder="Usuário">
</div>

<div class="input-group">
    <input id="email" type="email" placeholder="Email">
</div>

<div class="input-group">
    <input type="password" id="senha" placeholder="Senha">
    <i class="fa-solid fa-eye toggle-password" onclick="mostrarSenha('senha', this)"></i>
</div>

<div class="input-group">
    <input type="password" id="confirmarSenha" placeholder="Confirmar Senha">
    <i class="fa-solid fa-eye toggle-password" onclick="mostrarSenha('confirmarSenha', this)"></i>
</div>

    <button class="btn signup-btn" onclick="register()">
        Criar Conta
    </button>

    <a href="index.html" class="login-link">
        Já possui conta? Entrar
    </a>

    <div class="footer">
        © The Gods - Arcryx X Pegalabyte
    </div>

</div>

</body>
<script>

function mostrarSenha(idCampo, icone){
    const campo = document.getElementById(idCampo);

    if(campo.type === "password"){
        campo.type = "text";
        icone.classList.remove("fa-eye");
        icone.classList.add("fa-eye-slash");
    } else {
        campo.type = "password";
        icone.classList.remove("fa-eye-slash");
        icone.classList.add("fa-eye");
    }
}

function register(){

    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    const confirmarSenha = document.getElementById("confirmarSenha").value;

    // validações básicas
    if(!username || !email || !senha){
        alert("Preencha todos os campos!");
        return;
    }

    if(senha !== confirmarSenha){
        alert("As senhas não coincidem!");
        return;
    }

    fetch("http://localhost:3000/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username,
            email: email,
            password: senha
        })
    })
    .then(res => res.json())
    .then(data => {

        if(data.error){
            alert("Erro: " + data.error);
            return;
        }

        alert(data.message || "Conta criada com sucesso!");

        // volta pro login
        window.location.href = "index.html";
    })
    .catch(err => {
        console.error(err);
        alert("Erro ao conectar com o servidor");
    });

}

</script>
</html>
