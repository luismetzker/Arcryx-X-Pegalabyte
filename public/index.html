<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gods - Arcryx Pegalabyte</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<style>

/* ===== SEU CSS INTACTO ===== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;

    background:linear-gradient(
        -45deg,
        #00140f,
        #001f30,
        #003d2f,
        #00284a
    );

    background-size:400% 400%;
    animation:fundoAnimado 10s ease infinite;
}

body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    radial-gradient(
        ellipse at center,
        rgba(0,0,0,0) 15%,
        rgba(0,0,0,0.35) 55%,
        rgba(0,0,0,0.75) 80%,
        rgba(0,0,0,0.95) 100%
    );

    pointer-events:none;
    z-index:0;
}

@keyframes fundoAnimado{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.login-box{
    position:relative;
    z-index:1;
    width:420px;
    padding:40px;
    background:rgba(0,0,0,0.80);
    border:3px solid #7e6c09;
    border-radius:20px;
    backdrop-filter:blur(15px);
    text-align:center;
}

.logo{ width:140px; margin-bottom:15px; }

h1{
    color:rgb(249, 253, 0);
    margin-bottom:10px;
    font-size:24px;
    font-family:'Press Start 2P', cursive;
}

h2{ color:white; font-size:14px; }

.input-group{
    position:relative;
    margin-bottom:18px;
}

.input-group input{
    width:100%;
    padding:14px 45px 14px 15px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#101010;
    color:white;
    border:1px solid #333;
}

.input-group input:focus{
    border-color:#00ff99;
    box-shadow:0 0 15px #00ff99;
}

.input-group i{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    color:#aaa;
}

.toggle-password{ cursor:pointer; }

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    transition: all 0.3s;
}

.login-btn{
    background:#00ff99;
    color:black;
}

.login-btn:hover{
    box-shadow:0 0 15px #00ff99;
    transform: translateY(-2px);
}

.login-btn:disabled{
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
}

.register-btn{
    margin-top:12px;
    background:transparent;
    color:#FFD700;
    border:2px solid #FFD700;
}

.register-btn:hover{
    background:#FFD700;
    color:black;
    transform: translateY(-2px);
}

.footer{
    margin-top:20px;
    color:#666;
    font-size:12px;
}

.loading-spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #000;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

</style>

<body>

<div class="login-box">

    <img src="logo.png" class="logo">

    <h1>Arcryx X Pegalabyte</h1>
    <h2>By: The Gods</h2>

    <div class="input-group">
        <input type="text" id="email" placeholder="Usuário ou Email" autocomplete="username">
        <i class="fa-solid fa-user"></i>
    </div>

    <div class="input-group">
        <input type="password" id="senha" placeholder="Senha" autocomplete="current-password">
        <i class="fa-solid fa-eye toggle-password" onclick="mostrarSenha()"></i>
    </div>

    <button class="btn login-btn" onclick="login()" id="loginBtn">Entrar</button>

    <button class="btn register-btn" onclick="window.location.href='signup.html'">
        Criar Conta
    </button>

    <div class="footer">
        © The Gods - Arcryx X Pegalabyte
    </div>

</div>

<script>

function mostrarSenha(){
    const senha = document.getElementById("senha");
    const olho = document.querySelector(".toggle-password");

    if(senha.type === "password"){
        senha.type = "text";
        olho.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        senha.type = "password";
        olho.classList.replace("fa-eye-slash", "fa-eye");
    }
}

async function login(){

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("senha").value.trim();

    if(!email || !password){
        alert("Preencha todos os campos!");
        return;
    }

    const btn = document.getElementById("loginBtn");
    const originalText = btn.innerHTML;
    
    // Mostrar loading
    btn.innerHTML = '<span class="loading-spinner"></span> Entrando...';
    btn.disabled = true;

    try {
        const response = await fetch("https://arcryx-x-pegalabyte.onrender.com/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();

        if(data.error){
            alert(data.error);
            btn.innerHTML = originalText;
            btn.disabled = false;
            return;
        }

        if(!data.redirect){
            alert("Erro: sem redirect do servidor");
            btn.innerHTML = originalText;
            btn.disabled = false;
            return;
        }

        // ============================================================
        // 🔥 IMPORTANTE: SALVAR DADOS DO USUÁRIO NO localStorage
        // ============================================================
        if(data.user){
            localStorage.setItem("c2_user", JSON.stringify(data.user));
            localStorage.setItem("c2_api_key", data.user.api_key);
            localStorage.setItem("c2_email", data.user.email);
            localStorage.setItem("c2_is_admin", data.user.is_admin);
            localStorage.setItem("c2_is_paid", data.user.is_paid);
            console.log("✅ Dados do usuário salvos:", data.user);
            console.log("✅ Redirecionando para:", data.redirect);
        } else {
            console.error("❌ Nenhum dado de usuário recebido do servidor");
        }

        // Redirecionar
        window.location.href = data.redirect;
        
    } catch(err) {
        console.error("Erro:", err);
        alert("Erro ao conectar com o servidor: " + err.message);
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
}

// ============================================================
// VERIFICAR SE JÁ ESTÁ LOGADO
// ============================================================
(function checkExistingSession() {
    const savedUser = localStorage.getItem("c2_user");
    const savedApiKey = localStorage.getItem("c2_api_key");
    
    console.log("🔍 Verificando sessão existente...");
    console.log("savedUser:", savedUser);
    console.log("savedApiKey:", savedApiKey);
    
    if(savedUser && savedApiKey){
        try {
            const user = JSON.parse(savedUser);
            console.log("🔄 Usuário já logado:", user.email);
            console.log("is_admin:", user.is_admin);
            console.log("is_paid:", user.is_paid);
            
            // Aguardar 1 segundo antes de redirecionar para garantir
            setTimeout(() => {
                if(user.is_admin === 1){
                    console.log("👑 Redirecionando para admin.html");
                    window.location.href = "/admin.html";
                } else if(user.is_paid === 1){
                    console.log("🎮 Redirecionando para trojan_panel.html");
                    window.location.href = "/trojan_panel.html";
                } else {
                    console.log("⚠️ Redirecionando para dashboard.html");
                    window.location.href = "/dashboard.html";
                }
            }, 100);
        } catch(e) {
            console.error("❌ Erro ao parsear usuário:", e);
            // Limpar dados inválidos
            localStorage.removeItem("c2_user");
            localStorage.removeItem("c2_api_key");
        }
    } else {
        console.log("🔓 Nenhuma sessão ativa");
    }
})();

</script>

</body>
</html>
